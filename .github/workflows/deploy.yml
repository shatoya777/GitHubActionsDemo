# Name of this workflow (appears in GitHub Actions dashboard)
name: Deploy to GitHub Pages

# -----------------------------------------------------------------------------
# TRIGGERS (Events that start this workflow)
# -----------------------------------------------------------------------------
on:
  push:                # Runs when someone pushes code
    branches:
      - main           # Only when pushing to the 'main' branch (not other branches)

# -----------------------------------------------------------------------------
# PERMISSIONS (What this workflow is allowed to do)
# -----------------------------------------------------------------------------
permissions:
  contents: read       # Can read your repository's code (safe, default)
  pages: write         # Can write/deploy to GitHub Pages (needed to publish)
  id-token: write      # Needed for authentication with GitHub's deployment system

# -----------------------------------------------------------------------------
# JOBS (The actual work to be done)
# -----------------------------------------------------------------------------
jobs:
  deploy:              # Name of this job (you can call it anything)
    
    # RUNNER (The virtual computer that executes this job)
    runs-on: ubuntu-latest   # Use the latest Ubuntu Linux environment
    
    # -------------------------------------------------------------------------
    # STEPS (Individual tasks that run in order, top to bottom)
    # -------------------------------------------------------------------------
    steps:
      
      # STEP 1: Get your code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        # What this does: Downloads your repo's code onto the runner
        # Without this, the runner has no access to your files
      
      # STEP 2: Prepare GitHub Pages environment
      - name: Setup Pages
        uses: actions/configure-pages@v5
        # What this does: Configures the runner with settings needed for Pages
        # Sets up correct paths, permissions, and environment variables
      
      # STEP 3: Package your website files
      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .      # Upload everything in the current folder (your whole site)
        # What this does: Bundles all your files into a .zip package
        # This package gets stored temporarily for deployment
      
      # STEP 4: Publish to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        # What this does: Takes the packaged files and deploys them
        # After this step, your site is live at username.github.io/repo-name